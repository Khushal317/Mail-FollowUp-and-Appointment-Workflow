<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Solar Site Visit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top right, #1e1b4b 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #064e3b 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 3rem 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--accent-green);
        }

        h1 {
            font-size: 1.75rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        
        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .details-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            padding: 1.5rem;
            text-align: left;
            margin-bottom: 2rem;
        }

        .details-row {
            margin-bottom: 1rem;
        }

        .details-row:last-child {
            margin-bottom: 0;
        }

        .details-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .details-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .loader {
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="card">
        <div id="loader" class="loader">Verifying booking details...</div>
        
        <div id="content" style="display: none;">
            <div class="success-icon">✅</div>
            <h1>Your free solar site visit has been scheduled successfully.</h1>
            <p class="subtitle">We've sent a confirmation email with all the details. Our team will see you soon!</p>
            
            <div class="details-box">
                <div class="details-row">
                    <span class="details-label">Date & Time</span>
                    <span class="details-value" id="dt-value">...</span>
                </div>
                <div class="details-row">
                    <span class="details-label">Confirmed Address</span>
                    <span class="details-value" id="addr-value">...</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('loader').innerText = "Invalid link.";
            return;
        }
        
        try {
            const res = await fetch(`/api/appointments/confirmation/${token}`);
            if (res.ok) {
                const data = await res.json();
                
                const dateObj = new Date(data.date_time);
                const dateStr = dateObj.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                const timeStr = dateObj.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
                
                document.getElementById('dt-value').innerText = `${dateStr} at ${timeStr}`;
                document.getElementById('addr-value').innerText = data.address;
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                document.getElementById('loader').innerText = "Booking not found or not confirmed.";
            }
        } catch (e) {
            document.getElementById('loader').innerText = "Network error loading details.";
        }
    });
</script>

</body>
</html>
